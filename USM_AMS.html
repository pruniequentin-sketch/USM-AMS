<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>USM — AMS Performance</title>
<script src="data.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Barlow+Condensed:wght@400;500;600;700;900&family=Barlow:wght@300;400;500&display=swap');
:root{
  --bg0:#07090d;--bg1:#0d1017;--bg2:#131720;--bg3:#1a2030;
  --b:rgba(255,255,255,.06);--b2:rgba(255,255,255,.11);
  --t1:#e8eaf0;--t2:#8892a4;--t3:#3d4a5c;
  --gold:#f0c040;--blue:#4a9eff;--green:#2dd4a0;
  --red:#ff4455;--orange:#ff9040;--purple:#a78bfa;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Barlow',sans-serif;background:var(--bg0);color:var(--t1);min-height:100vh}
.topbar{position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:12px;padding:.6rem 1.5rem;background:rgba(7,9,13,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--b2)}
.logo{width:38px;height:38px;border-radius:50%;background:conic-gradient(from 135deg,#1a7a3a,#f0c040,#1a7a3a);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:12px;color:#fff;flex-shrink:0}
.brand{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;color:var(--gold);letter-spacing:.08em}
.brand-sub{font-size:9px;color:var(--t3);font-family:'DM Mono',monospace}
.nav{display:flex;gap:3px;flex:1;justify-content:center;flex-wrap:wrap}
.nb{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:.06em;padding:6px 14px;border-radius:5px;border:.5px solid transparent;color:var(--t3);cursor:pointer;background:transparent;transition:all .15s}
.nb:hover{color:var(--t2);background:var(--bg3)}
.nb.on{background:var(--bg3);border-color:var(--b2);color:var(--gold)}
.sbadge{background:var(--bg3);border:.5px solid rgba(240,192,64,.3);border-radius:5px;padding:4px 12px;font-family:'DM Mono',monospace;font-size:11px;color:var(--gold);cursor:pointer}
.main{padding:1.25rem 1.5rem;max-width:1600px;margin:0 auto}
.pg{display:none}.pg.on{display:block}
.card{background:var(--bg1);border:.5px solid var(--b);border-radius:10px;padding:1.25rem;margin-bottom:1rem;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent)}
.ct{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;color:var(--t3);text-transform:uppercase;margin-bottom:.875rem}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:.875rem}
.kpi{background:var(--bg2);border-radius:8px;padding:.875rem 1rem;border:.5px solid var(--b);position:relative;overflow:hidden}
.kl{font-family:'DM Mono',monospace;font-size:8px;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
.kv{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:700;line-height:1}
.ks{font-size:10px;color:var(--t3);font-family:'DM Mono',monospace;margin-top:4px}
.kb{position:absolute;bottom:0;left:0;height:3px;border-radius:0 3px 0 0;transition:width .6s}
.btn{padding:7px 16px;border-radius:6px;border:none;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;letter-spacing:.05em;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.bg{background:rgba(240,192,64,.15);color:var(--gold);border:.5px solid rgba(240,192,64,.3)}.bg:hover{background:rgba(240,192,64,.25)}
.bb{background:rgba(74,158,255,.15);color:var(--blue);border:.5px solid rgba(74,158,255,.3)}.bb:hover{background:rgba(74,158,255,.25)}
.bgr{background:rgba(45,212,160,.15);color:var(--green);border:.5px solid rgba(45,212,160,.3)}.bgr:hover{background:rgba(45,212,160,.25)}
.br{background:rgba(255,68,85,.15);color:var(--red);border:.5px solid rgba(255,68,85,.3)}.br:hover{background:rgba(255,68,85,.25)}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-family:'DM Mono',monospace;font-size:8px;font-weight:500}
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-family:'DM Mono',monospace;font-size:8px;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;padding:.5rem .75rem;border-bottom:.5px solid var(--b2);text-align:left;white-space:nowrap}
.tbl td{padding:.6rem .75rem;border-bottom:.5px solid var(--b);font-size:13px}
.tbl tr:hover td{background:var(--bg2)}
.inp{background:var(--bg2);border:.5px solid var(--b2);border-radius:6px;padding:8px 12px;color:var(--t1);font-family:'Barlow',sans-serif;font-size:13px;width:100%;outline:none;transition:border-color .15s}
.inp:focus{border-color:rgba(240,192,64,.4)}
.inp::placeholder{color:var(--t3)}
.lbl{font-family:'DM Mono',monospace;font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px;display:block}
.nw{position:fixed;bottom:1.5rem;right:1.5rem;z-index:9999;display:flex;flex-direction:column;gap:.5rem}
.nf{background:var(--bg2);border:.5px solid var(--b2);border-radius:8px;padding:.75rem 1rem;font-size:12px;color:var(--t1);box-shadow:0 4px 24px rgba(0,0,0,.4);animation:sIn .2s ease}
@keyframes sIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.md{background:var(--bg1);border:.5px solid var(--b2);border-radius:12px;padding:1.75rem;width:100%;max-width:800px;position:relative;box-shadow:0 24px 60px rgba(0,0,0,.6);max-height:92vh;overflow-y:auto}
.mt{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;margin-bottom:1.25rem;display:flex;align-items:center;gap:.75rem}
.mc{position:absolute;top:1rem;right:1rem;width:28px;height:28px;border-radius:5px;background:var(--bg3);border:.5px solid var(--b2);color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px}
.mc:hover{background:var(--red);color:#fff}
.pb{background:var(--bg3);border-radius:4px;height:5px;overflow:hidden;margin-top:3px}
.pbi{height:100%;border-radius:4px;transition:width .6s}
.av{display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:700;flex-shrink:0;border-radius:50%}
.sep{height:.5px;background:var(--b2);margin:1rem 0}
.tag-m{background:rgba(255,144,64,.15);color:var(--orange);border:.5px solid rgba(255,144,64,.3);padding:2px 8px;border-radius:4px;font-family:'DM Mono',monospace;font-size:8px}
.tag-t{background:rgba(74,158,255,.08);color:var(--t3);border:.5px solid var(--b);padding:2px 8px;border-radius:4px;font-family:'DM Mono',monospace;font-size:8px}
.up{color:var(--green)}.dn{color:var(--red)}.neu{color:var(--t3)}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">USM</div>
  <div style="display:flex;flex-direction:column">
    <div class="brand">USM AMS</div>

    <button class="nb" onclick="nav('matchs',this)">🏉 Matchs</button>
    <button class="nb" onclick="nav('charge',this)">⚡ Charge ACWR</button>
    <button class="nb" onclick="nav('joueurs',this)">👥 Joueurs</button>
    <button class="nb" onclick="nav('analyse',this)">📊 Analyse</button>
    <button class="nb" onclick="nav('planning',this)">📅 Planning</button>
    <button class="nb" onclick="nav('blessures',this)">🏥 Blessures</button>
    <button class="nb" onclick="nav('rapports',this)">📄 Rapports</button>

</div>

<div class="main">
  <div class="pg on" id="pg-dashboard"></div>
  <div class="pg" id="pg-matchs"></div>
  <div class="pg" id="pg-charge"></div>
  <div class="pg" id="pg-joueurs"></div>
  <div class="pg" id="pg-analyse"></div>
  <div class="pg" id="pg-planning"></div>
  <div class="pg" id="pg-blessures"><div style="display:flex;flex-direction:column;align-items:center;padding:4rem;gap:1rem"><div style="font-size:48px">🏥</div><div style="font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:700;color:var(--t2)">Blessures</div><div style="font-size:13px;color:var(--t3)">Module en cours de développement</div></div></div>
  <div class="pg" id="pg-rapports"><div style="display:flex;flex-direction:column;align-items:center;padding:4rem;gap:1rem"><div style="font-size:48px">📄</div><div style="font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:700;color:var(--t2)">Rapports PDF</div><div style="font-size:13px;color:var(--t3)">Module en cours de développement</div></div></div>
  <div class="pg" id="pg-params">
    <div class="card">
      <div class="ct">🗓 Gestion des saisons</div>
      <div class="g4" style="margin-bottom:1rem">
        <div><label class="lbl">Nom saison</label><input class="inp" id="inp-snom" placeholder="ex: 2026/27"/></div>
        <div><label class="lbl">Date début</label><input class="inp" id="inp-sdeb" type="date"/></div>
        <div><label class="lbl">Date fin</label><input class="inp" id="inp-sfin" type="date"/></div>

      </div>
      <div id="list-saisons"></div>
    </div>
    <div class="card">
      <div class="ct">👤 Ajouter un joueur — Saison <span id="param-saison-label" style="color:var(--gold)"></span></div>
      <div class="g3" style="margin-bottom:.75rem">
        <div><label class="lbl">Nom complet</label><input class="inp" id="inp-jnom" placeholder="Prénom Nom"/></div>
        <div><label class="lbl">Initiales Catapult</label><input class="inp" id="inp-jinit" placeholder="ex: JF"/></div>
        <div><label class="lbl">Poste</label><select class="inp" id="inp-jposte"></select></div>
      </div>
      <div class="g2" style="margin-bottom:.75rem">
        <div><label class="lbl">Groupe</label><select class="inp" id="inp-jgroupe"></select></div>
        <div><label class="lbl">Date de naissance</label><input class="inp" id="inp-jddn" type="date"/></div>
      </div>

    </div>
    <div class="card">
      <div class="ct">📋 Effectif saison active <span id="nb-j" style="color:var(--gold)"></span></div>
      <table class="tbl"><thead><tr><th>Init</th><th>Joueur</th><th>Poste</th><th>Groupe</th><th>Âge</th><th>Actions</th></tr></thead><tbody id="tb-j"></tbody></table>
    </div>
    <div class="card">
      <div class="ct">💾 Sauvegarde</div>
      <div style="display:flex;gap:.75rem">
        <button class="btn bg" onclick="DB.exportAll()">⬇ Backup JSON</button>
        <label class="btn bb" style="cursor:pointer">⬆ Restaurer<input type="file" accept=".json" style="display:none" onchange="DB.importAll(this.files[0])"></label>
      </div>
    </div>
  </div>
</div>

<div class="nw" id="nw"></div>

<div class="mo" id="mo-edit" style="display:none" onclick="if(event.target===this)cmo('mo-edit')">
  <div class="md" style="max-width:500px">
    <div class="mt"><span id="mo-av" class="av" style="width:38px;height:38px;font-size:13px"></span>✏️ Modifier</div>
    <div class="mc" onclick="cmo('mo-edit')">✕</div>
    <input type="hidden" id="mo-id"/>
    <div class="g2" style="margin-bottom:.75rem"><div><label class="lbl">Nom</label><input class="inp" id="mo-nom"/></div><div><label class="lbl">Initiales</label><input class="inp" id="mo-init"/></div></div>
    <div class="g3" style="margin-bottom:.75rem"><div><label class="lbl">Poste</label><select class="inp" id="mo-poste"></select></div><div><label class="lbl">Groupe</label><select class="inp" id="mo-groupe"></select></div><div><label class="lbl">Naissance</label><input class="inp" id="mo-ddn" type="date"/></div></div>
    <div style="display:flex;gap:.75rem;justify-content:flex-end;margin-top:1rem">
      <button class="btn" style="background:var(--bg3);color:var(--t2);border:.5px solid var(--b2)" onclick="cmo('mo-edit')">Annuler</button>
      <button class="btn bgr" onclick="saveJoueur()">✓ Enregistrer</button>
    </div>
  </div>
</div>

<div class="mo" id="mo-detail" style="display:none" onclick="if(event.target===this)cmo('mo-detail')">
  <div class="md"><div class="mt" id="mo-dtitle"></div><div class="mc" onclick="cmo('mo-detail')">✕</div><div id="mo-dcontent"></div></div>
</div>

<script>
var DATES_M=['2025-09-06','2025-09-13','2025-09-27','2025-10-04','2025-10-11','2025-10-25','2025-11-01','2025-11-15','2025-11-22','2025-11-29','2025-12-13','2026-01-10','2026-01-17','2026-03-21','2026-03-28','2026-04-18'];
var JOUEURS_DEF=[
  {nom:'FRANCONE Jules',init:'JF',poste:'AILIER',groupe:'BACKS'},
  {nom:'GADE Asaeli',init:'DG',poste:'CENTRE',groupe:'BACKS'},
  {nom:'GAYRAL Gabriel',init:'GG',poste:'AILIER',groupe:'BACKS'},
  {nom:'LEFLAMAND Merlin',init:'MLF',poste:'N10',groupe:'BACKS'},
  {nom:'PENETRO Jean',init:'JP',poste:'N9',groupe:'BACKS'},
  {nom:'ROUGERIE Mathis',init:'MR',poste:'AILIER',groupe:'BACKS'},
  {nom:'SEUX Jean',init:'JS',poste:'ARRIERE',groupe:'BACKS'},
  {nom:'VANOUDENDYCKE Eliot',init:'EV',poste:'N9',groupe:'BACKS'},
  {nom:'AUREJAC Luca',init:'LA',poste:'TALON',groupe:'BIG 5'},
  {nom:'CHAYEB Corentyn',init:'CCB',poste:'2L',groupe:'BIG 5'},
  {nom:'EZIESIVILI Levani',init:'LE',poste:'PILIER',groupe:'BIG 5'},
  {nom:'FAULONG Esteban',init:'EFA',poste:'TALON',groupe:'BIG 5'},
  {nom:'GODEBILLE Teki',init:'TG',poste:'PILIER',groupe:'BIG 5'},
  {nom:'HALAVATAU Rio',init:'RH',poste:'PILIER',groupe:'BIG 5'},
  {nom:'HUMBERT Quentin',init:'QH',poste:'2L',groupe:'BIG 5'},
  {nom:'LAUMOND Jules',init:'JLA',poste:'PILIER',groupe:'BIG 5'},
  {nom:'LORENZO Mateo',init:'ML',poste:'2L',groupe:'BIG 5'},
  {nom:'ROBERT Julien',init:'JR',poste:'PILIER',groupe:'BIG 5'},
  {nom:'BOUSQUET Jules',init:'JBO',poste:'3L',groupe:'RUNNERS'},
  {nom:'DEVINCK Matisse',init:'MDK',poste:'2L',groupe:'RUNNERS'},
  {nom:'DEVIS Remi',init:'RD',poste:'3L',groupe:'RUNNERS'},
  {nom:'FENTON Charlie',init:'CF',poste:'3L',groupe:'RUNNERS'},
  {nom:'GILLE Aurelien',init:'AG',poste:'CENTRE',groupe:'RUNNERS'},
  {nom:'JULIA Ezio',init:'EJ',poste:'CENTRE',groupe:'RUNNERS'},
  {nom:'LETELLIER Gabin',init:'GL',poste:'CENTRE',groupe:'RUNNERS'},
  {nom:'ROKOSUKA Tevita',init:'TR',poste:'AILIER',groupe:'RUNNERS'}
];
var GROUPES_DEF=[{nom:'BACKS',color:'#4a9eff'},{nom:'BIG 5',color:'#f0c040'},{nom:'RUNNERS',color:'#2dd4a0'}];
var POSTES_DEF=['PILIER','TALON','2L','3L','N9','N10','CENTRE','AILIER','ARRIERE'];
var SAISONS_DEF=[{nom:'2025/26',deb:'2025-07-01',fin:'2026-06-30'}];

// NAV
function nav(pg,btn){
  document.querySelectorAll('.pg').forEach(function(p){p.classList.remove('on');});
  document.querySelectorAll('.nb').forEach(function(b){b.classList.remove('on');});
  document.getElementById('pg-'+pg).classList.add('on');
  if(btn) btn.classList.add('on');
  var fns={dashboard:rDash,matchs:rMatchs,charge:rCharge,joueurs:rJoueurs,analyse:rAnalyse,planning:rPlanning,params:rParams};
  if(fns[pg]) fns[pg]();
}

// NOTIF
function notif(msg,t){
  t=t||'ok';var w=document.getElementById('nw');var n=document.createElement('div');
  var c={ok:'var(--green)',warn:'var(--orange)',err:'var(--red)',info:'var(--blue)'};
  n.className='nf';n.style.borderColor=c[t]||c.ok;n.textContent=msg;
  w.appendChild(n);setTimeout(function(){n.remove();},3500);
}
function cmo(id){document.getElementById(id).style.display='none';}

// DB
var DB={
  get:function(k){try{return JSON.parse(localStorage.getItem('usm_'+k));}catch(e){return null;}},
  set:function(k,v){try{localStorage.setItem('usm_'+k,JSON.stringify(v));return true;}catch(e){return false;}},
  exportAll:function(){
    var d={};for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(k.startsWith('usm_'))d[k]=localStorage.getItem(k);}
    var b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
    var a=document.createElement('a');a.href=URL.createObjectURL(b);
    a.download='USM_AMS_backup_'+new Date().toISOString().slice(0,10)+'.json';a.click();notif('Backup exporté');
  },
  importAll:function(file){
    var r=new FileReader();r.onload=function(e){
      try{var d=JSON.parse(e.target.result);Object.entries(d).forEach(function(kv){localStorage.setItem(kv[0],kv[1]);});notif('Restauré');setTimeout(function(){location.reload();},600);}
      catch(ex){notif('Fichier invalide','err');}
    };r.readAsText(file);
  }
};

// SAISONS
function getSaisons(){return DB.get('saisons')||SAISONS_DEF;}
function setSaisons(s){DB.set('saisons',s);}
function getSA(){return DB.get('saison_active')||'2025/26';}
function setSA(s){DB.set('saison_active',s);document.getElementById('sbadge').textContent='S '+s;}
function getSaisonObj(nom){return getSaisons().find(function(s){return s.nom===nom;})||SAISONS_DEF[0];}

// JOUEURS PAR SAISON
function getJ(saison){
  saison=saison||getSA();
  var all=DB.get('joueurs')||{};
  return all[saison]||[];
}
function setJ(j,saison){
  saison=saison||getSA();
  var all=DB.get('joueurs')||{};
  all[saison]=j;DB.set('joueurs',all);
}
function getG(){return DB.get('groupes')||GROUPES_DEF;}
function gc(nom){var g=getG().find(function(x){return x.nom===nom;});return g?g.color:'var(--t2)';}
function ini(nom){return nom.split(' ').map(function(x){return x[0];}).join('').slice(0,2).toUpperCase();}
function fd(d){return new Date(d).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'2-digit'});}

// DATA HELPERS
function rowsJ(init){return AD.filter(function(r){return r.j===init;});}
function matchesJ(init){return AD.filter(function(r){return r.j===init&&r.type==='match';});}
function trainsJ(init){return AD.filter(function(r){return r.j===init&&r.type==='train';});}
function charge(r){return r.d15+r.d18+r.d21;}

// DERNIERE DATE EN BASE
function lastDate(){
  var dates=AD.map(function(r){return r.da;}).sort();
  return dates[dates.length-1];
}

// REF 3 DERNIERS MATCHS JOUEUR
function ref3(init){
  var rows=matchesJ(init).filter(function(r){return r.dt>200;});
  rows.sort(function(a,b){return b.da.localeCompare(a.da);});
  var last3=rows.slice(0,3);
  if(!last3.length) return null;
  return{
    dt:Math.round(last3.reduce(function(s,r){return s+r.dt;},0)/last3.length),
    d15:Math.round(last3.reduce(function(s,r){return s+r.d15;},0)/last3.length),
    d18:Math.round(last3.reduce(function(s,r){return s+r.d18;},0)/last3.length),
    d21:Math.round(last3.reduce(function(s,r){return s+r.d21;},0)/last3.length),
    vm:Math.max.apply(null,last3.map(function(r){return r.vm;})).toFixed(1),
    n85:Math.round(last3.reduce(function(s,r){return s+r.n85;},0)/last3.length),
    n:last3.length
  };
}

// REF EQUIPE
function teamRef3(){
  var last3=DATES_M.slice(-3);
  var stats=last3.map(function(d){
    var rows=AD.filter(function(r){return r.type==='match'&&r.da===d&&r.dt>200;});
    if(!rows.length) return null;
    return{d15:rows.reduce(function(s,r){return s+r.d15;},0)/rows.length,d18:rows.reduce(function(s,r){return s+r.d18;},0)/rows.length,d21:rows.reduce(function(s,r){return s+r.d21;},0)/rows.length};
  }).filter(Boolean);
  if(!stats.length) return null;
  return{d15:Math.round(stats.reduce(function(s,r){return s+r.d15;},0)/stats.length),d18:Math.round(stats.reduce(function(s,r){return s+r.d18;},0)/stats.length),d21:Math.round(stats.reduce(function(s,r){return s+r.d21;},0)/stats.length)};
}

// STATS EQUIPE PAR DATE
function teamByDate(date){
  var rows=AD.filter(function(r){return r.type==='match'&&r.da===date&&r.dt>200;});
  if(!rows.length) return null;
  return{d15:Math.round(rows.reduce(function(s,r){return s+r.d15;},0)/rows.length),d18:Math.round(rows.reduce(function(s,r){return s+r.d18;},0)/rows.length),d21:Math.round(rows.reduce(function(s,r){return s+r.d21;},0)/rows.length),dt:Math.round(rows.reduce(function(s,r){return s+r.dt;},0)/rows.length),vm:Math.max.apply(null,rows.map(function(r){return r.vm;})).toFixed(1),n:rows.length};
}

// REFS TRAINING & MATCH SEPAREES (Option C)
function refsJoueur(init){
  var mrows=matchesJ(init).filter(function(r){return r.dt>200;});
  var sems=chargeParSem(init);
  var semsT=sems.filter(function(s){return !s.hasMatch&&s.sessions>0;});
  var refT=semsT.length?{
    d15:Math.round(semsT.reduce(function(s,r){return s+r.d15;},0)/semsT.length),
    d18:Math.round(semsT.reduce(function(s,r){return s+r.d18;},0)/semsT.length),
    d21:Math.round(semsT.reduce(function(s,r){return s+r.d21;},0)/semsT.length),
    charge:Math.round(semsT.reduce(function(s,r){return s+r.d15+r.d18+r.d21;},0)/semsT.length)
  }:null;
  var mDurRows=mrows.filter(function(r){return r.dur>0;});
  var mDurMoy=mDurRows.length?Math.round(mDurRows.reduce(function(s,r){return s+r.dur;},0)/mDurRows.length):0;
  var refM=mrows.length?{
    d15:Math.round(mrows.reduce(function(s,r){return s+r.d15;},0)/mrows.length),
    d18:Math.round(mrows.reduce(function(s,r){return s+r.d18;},0)/mrows.length),
    d21:Math.round(mrows.reduce(function(s,r){return s+r.d21;},0)/mrows.length),
    charge:Math.round(mrows.reduce(function(s,r){return s+r.d15+r.d18+r.d21;},0)/mrows.length),
    durMoy:mDurMoy
  }:null;
  return{train:refT,match:refM};
}

// ACWR - date ref = derniere donnee en base
function acwr(init,refDateStr){
  var ld=refDateStr||lastDate();
  var ref=new Date(ld);
  var rows=rowsJ(init);
  var byDate={};
  rows.forEach(function(r){if(!byDate[r.da])byDate[r.da]=0;byDate[r.da]+=charge(r);});
  var a7=0,c28=0;
  Object.keys(byDate).forEach(function(ds){
    var diff=(ref-new Date(ds))/86400000;
    if(diff>=0&&diff<7) a7+=byDate[ds];
    if(diff>=0&&diff<28) c28+=byDate[ds];
  });
  var acute=a7/7,chronic=c28/28;
  var ratio=chronic>0?Math.round(acute/chronic*100)/100:0;
  return{acute:Math.round(acute),chronic:Math.round(chronic),ratio:ratio,refDate:ld};
}
function acwrC(r){if(r===0)return'var(--t3)';if(r<0.8)return'var(--blue)';if(r<=1.3)return'var(--green)';if(r<=1.5)return'var(--orange)';return'var(--red)';}
function acwrL(r){if(r===0)return'—';if(r<0.8)return'SOUS-CHARGE';if(r<=1.3)return'OPTIMAL';if(r<=1.5)return'ÉLEVÉ';return'SURCHARGE';}

// CHARGE PAR SEMAINE
function chargeParSem(init){
  var rows=rowsJ(init);
  var bySem={};
  rows.forEach(function(r){
    var d=new Date(r.da);var day=d.getDay()||7;var mon=new Date(d);mon.setDate(d.getDate()-day+1);
    var k=mon.toISOString().slice(0,10);
    if(!bySem[k])bySem[k]={k:k,d15:0,d18:0,d21:0,dt:0,dur:0,sessions:0,hasMatch:false,matchDur:0};
    bySem[k].d15+=r.d15;bySem[k].d18+=r.d18;bySem[k].d21+=r.d21;bySem[k].dt+=r.dt;bySem[k].dur+=r.dur;bySem[k].sessions++;
    if(r.type==='match'){bySem[k].hasMatch=true;bySem[k].matchDur+=r.dur;}
  });
  return Object.values(bySem).sort(function(a,b){return a.k.localeCompare(b.k);});
}

function evo(val,ref){if(!ref||ref===0)return null;return Math.round((val/ref-1)*100);}

  if(pct===null)return '<span class="neu">—</span>';

}

      h+='<td style="font-family:\'DM Mono\',monospace;font-size:12px">'+p.a.acute+'m</td>';
      h+='<td style="font-family:\'DM Mono\',monospace;font-size:12px">'+p.a.chronic+'m</td>';
      h+='<td><div style="display:flex;align-items:center;gap:8px"><div style="width:90px"><div class="pb"><div class="pbi" style="width:'+Math.min(p.a.ratio/1.6*100,100)+'%;background:'+acwrC(p.a.ratio)+'"></div></div></div><span style="font-family:\'Barlow Condensed\',sans-serif;font-size:20px;font-weight:700;color:'+acwrC(p.a.ratio)+'">'+p.a.ratio+'</span></div></td>';
      h+='<td><span class="badge" style="background:'+acwrC(p.a.ratio)+'22;color:'+acwrC(p.a.ratio)+';border:.5px solid '+acwrC(p.a.ratio)+'44">'+acwrL(p.a.ratio)+'</span></td></tr>';
    });
    h+='</tbody></table>';
  } else {h+='<div style="text-align:center;padding:2rem;color:var(--t3)">Pas de données</div>';}
  h+='</div>';
  document.getElementById('pg-charge').innerHTML=h;

  // Dessiner le graphique SVG après rendu
  setTimeout(function(){
    var j2=getJ();
    var ld2=lastDate();
    // Calculer ACWR par joueur trié
    var data=j2.map(function(p){
      var a=acwr(p.init);
      var gr=getG().find(function(x){return x.nom===p.groupe;});
      return a.ratio>0?{init:p.init,nom:p.nom.split(' ')[0],ratio:a.ratio,color:gr?gr.color:'#888',groupe:p.groupe}:null;
    }).filter(Boolean).sort(function(a,b){return b.ratio-a.ratio;});

    var svg=document.getElementById('acwr-chart');
    if(!svg||!data.length) return;
    var W=svg.getBoundingClientRect().width||800;
    var H=220,pad={t:20,r:20,b:40,l:45};
    var cW=W-pad.l-pad.r,cH=H-pad.t-pad.b;
    var maxR=Math.max(2,Math.max.apply(null,data.map(function(d){return d.ratio;})));
    var xStep=cW/data.length;

    var out='';
    // Zones colorées
    var zones=[
      {min:0,max:0.8,color:'rgba(74,158,255,0.08)'},
      {min:0.8,max:1.3,color:'rgba(45,212,160,0.1)'},
      {min:1.3,max:1.5,color:'rgba(255,144,64,0.1)'},
      {min:1.5,max:maxR+0.2,color:'rgba(255,68,85,0.08)'}
    ];
    zones.forEach(function(z){
      var y1=cH-(Math.min(z.max,maxR+0.2)/maxR)*cH;
      var y2=cH-(z.min/maxR)*cH;
      out+='<rect x="'+pad.l+'" y="'+(pad.t+y1)+'" width="'+cW+'" height="'+(y2-y1)+'" fill="'+z.color+'"/>';
    });

    // Lignes de référence
    [0.8,1.0,1.3,1.5].forEach(function(v){
      if(v>maxR) return;
      var y=pad.t+cH-(v/maxR)*cH;
      var col=v===1.0?'rgba(255,255,255,.15)':'rgba(255,255,255,.07)';
      out+='<line x1="'+pad.l+'" y1="'+y+'" x2="'+(pad.l+cW)+'" y2="'+y+'" stroke="'+col+'" stroke-width="1" stroke-dasharray="4,3"/>';
      out+='<text x="'+(pad.l-5)+'" y="'+(y+4)+'" text-anchor="end" fill="rgba(255,255,255,.4)" font-size="9" font-family="monospace">'+v+'</text>';
    });

    // Barres
    data.forEach(function(d,i){
      var x=pad.l+i*xStep+xStep*0.1;
      var bW=xStep*0.8;
      var bH=(d.ratio/maxR)*cH;
      var y=pad.t+cH-bH;
      var col=d.ratio<0.8?'#4a9eff':d.ratio<=1.3?'#2dd4a0':d.ratio<=1.5?'#ff9040':'#ff4455';
      out+='<rect x="'+x+'" y="'+y+'" width="'+bW+'" height="'+bH+'" fill="'+col+'" rx="2" opacity=".85"/>';
      // Label
      out+='<text x="'+(x+bW/2)+'" y="'+(pad.t+cH+14)+'" text-anchor="middle" fill="rgba(255,255,255,.5)" font-size="8" font-family="monospace">'+d.init+'</text>';
      // Valeur
      out+='<text x="'+(x+bW/2)+'" y="'+(y-4)+'" text-anchor="middle" fill="'+col+'" font-size="9" font-weight="bold" font-family="monospace">'+d.ratio+'</text>';
    });

    svg.innerHTML=out;
  },100);
}

// ════ ANALYSE ════
function buildRanking(joueurs){
  return joueurs.map(function(p){
    var rows=matchesJ(p.init).filter(function(r){return r.dt>200;});
    var gr=getG().find(function(x){return x.nom===p.groupe;});
    if(!rows.length) return null;
    var vmR=rows.filter(function(r){return r.vm>0;});
    var durR=rows.filter(function(r){return r.dur>0;});
    return{p:p,gr:gr,n:rows.length,
      moyD15:Math.round(rows.reduce(function(s,r){return s+r.d15;},0)/rows.length),
      moyD18:Math.round(rows.reduce(function(s,r){return s+r.d18;},0)/rows.length),
      moyD21:Math.round(rows.reduce(function(s,r){return s+r.d21;},0)/rows.length),
      vm:vmR.length?Math.max.apply(null,vmR.map(function(r){return r.vm;})).toFixed(1):'—',
      durCum:Math.round(durR.reduce(function(s,r){return s+r.dur;},0)),
      durMoy:durR.length?Math.round(durR.reduce(function(s,r){return s+r.dur;},0)/durR.length):0
    };
  }).filter(Boolean).sort(function(a,b){return b.moyD15-a.moyD15;});
}

function buildPlanningGrid(semaine,jours,matchDate,tref){
  var ratio=parseFloat(DB.get('plan_ratio')||1.5);
  var h='<div class="card" style="margin-bottom:1rem">';
  h+='<div style="display:flex;align-items:center;gap:1rem;margin-bottom:1rem;flex-wrap:wrap">';
  h+='<div class="ct" style="margin-bottom:0">📋 Organisation de la semaine</div>';
  h+='<div style="margin-left:auto;display:flex;gap:.5rem">';
  h+='<button class="btn bgr" onclick="sauvegarderSemaine(\''+semaine+'\')">💾 Sauvegarder</button>';
  h+='<button class="btn br" onclick="reinitSemaine(\''+semaine+'\')">↺ Réinitialiser</button>';
  h+='</div></div>';

  h+='<div style="display:flex;align-items:center;gap:.75rem;margin-bottom:1rem">';
  h+='<label class="lbl" style="margin-bottom:0;white-space:nowrap">📅 Date du match :</label>';
  h+='<input class="inp" type="date" id="plan-match-date" value="'+(matchDate||'')+'" style="width:180px"/>';
  h+='<div style="font-size:11px;color:var(--t3)">·</div>';
  h+='<div style="font-size:11px;color:var(--purple);font-family:\'DM Mono\',monospace">Ratio actif: <b>'+ratio+'×</b> — Métriques = Réf match × Ratio × %jour</div>';
  h+='</div>';

  var types=['repos','J-6','J-5','J-4','J-3','J-2','J-1','MATCH'];
  var typeColors={'repos':'var(--t3)','J-6':'var(--green)','J-5':'var(--blue)','J-4':'var(--blue)','J-3':'var(--orange)','J-2':'var(--purple)','J-1':'var(--purple)','MATCH':'var(--red)'};
  var typePctDef={'repos':0,'J-6':30,'J-5':50,'J-4':70,'J-3':90,'J-2':60,'J-1':30,'MATCH':100};
  var typeDesc={'repos':'Repos','J-6':'Récup. active','J-5':'Technique','J-4':'Collectif','J-3':'Haute intensité','J-2':'Activation','J-1':'Éveil neuromusc.','MATCH':'Compétition'};

  var lundi=new Date(semaine);
  h+='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:.625rem">';

  jours.forEach(function(j,idx){
    var dateJ=new Date(lundi);dateJ.setDate(lundi.getDate()+idx);
    var dateStr=dateJ.toISOString().slice(0,10);
    var t=j.type||'repos';
    var c=typeColors[t]||'var(--t3)';
    var pctVal=j.pct!==undefined?j.pct:typePctDef[t]||0;
    var pct=pctVal/100;
    var isRepos=t==='repos';

    var cD15=tref&&!isRepos?Math.round(tref.d15*ratio*pct):0;
    var cD18=tref&&!isRepos?Math.round(tref.d18*ratio*pct):0;
    var cD21=tref&&!isRepos?Math.round(tref.d21*ratio*pct):0;

    h+='<div style="background:var(--bg2);border-radius:8px;border:.5px solid '+c+'44;padding:.75rem .5rem;'+(t==='MATCH'?'background:rgba(255,68,85,.06)':'')+(isRepos?'opacity:.6':'')+'">'+
      '<div style="font-family:\'Barlow Condensed\',sans-serif;font-size:14px;font-weight:700;color:var(--t2);margin-bottom:2px">'+j.nom+'</div>'+
      '<div style="font-family:\'DM Mono\',monospace;font-size:9px;color:var(--t3);margin-bottom:.5rem">'+dateStr.slice(8,10)+'/'+dateStr.slice(5,7)+'</div>'+
      '<select onchange="updateJour(\''+semaine+'\','+idx+',\'type\',this.value)" style="background:var(--bg3);border:.5px solid var(--b2);border-radius:4px;color:'+c+';font-family:\'DM Mono\',monospace;font-size:10px;padding:3px 4px;width:100%;margin-bottom:.375rem">'+
      types.map(function(tp){return '<option value="'+tp+'"'+(tp===t?' selected':'')+'>'+tp+'</option>';}).join('')+
      '</select>';

    if(!isRepos){
      // Input % modifiable
      h+='<div style="display:flex;align-items:center;gap:4px;margin-bottom:.375rem">';
      h+='<input type="number" min="0" max="150" value="'+pctVal+'" onchange="updateJour(\''+semaine+'\','+idx+',\'pct\',parseInt(this.value))" style="background:var(--bg3);border:.5px solid '+c+'55;border-radius:4px;color:'+c+';font-family:\'DM Mono\',monospace;font-size:11px;padding:2px 5px;width:52px;text-align:center"/>';
      h+='<span style="font-size:9px;color:var(--t3);font-family:\'DM Mono\',monospace">% charge</span>';
      h+='</div>';
      h+='<div style="background:var(--bg3);border-radius:3px;height:3px;margin-bottom:.5rem"><div style="width:'+Math.min(pctVal,100)+'%;height:100%;background:'+c+';border-radius:3px"></div></div>';
      h+='<div style="font-size:9px;color:var(--t3);font-family:\'DM Mono\',monospace;margin-bottom:.375rem">'+typeDesc[t]+'</div>';
      if(tref){
        h+='<div style="font-family:\'DM Mono\',monospace;font-size:11px;color:var(--blue);font-weight:600">D&gt;15: '+cD15+'m</div>';
        h+='<div style="font-family:\'DM Mono\',monospace;font-size:10px;color:var(--purple)">D&gt;18: '+cD18+'m</div>';
        h+='<div style="font-family:\'DM Mono\',monospace;font-size:10px;color:var(--orange)">D&gt;21: '+cD21+'m</div>';
      }
    }

    h+='<textarea onchange="updateJour(\''+semaine+'\','+idx+',\'notes\',this.value)" placeholder="Notes..." style="width:100%;margin-top:.5rem;background:var(--bg3);border:.5px solid var(--b2);border-radius:4px;color:var(--t2);font-size:10px;padding:4px;resize:none;height:40px;font-family:\'Barlow\',sans-serif">'+( j.notes||'')+'</textarea>';
    h+='</div>';
  });

  h+='</div></div>';
  return h;
}

function changerSemaine(val){
  // S'assurer que c'est bien un lundi
  var d=new Date(val);var day=d.getDay()||7;
  d.setDate(d.getDate()-day+1);
  var lundi=d.toISOString().slice(0,10);
  DB.set('plan_sem',lundi);
  rPlanning();
}

function updateJour(semaine,idx,champ,val){
  var sems=getSemaines();
  if(!sems[semaine]) sems[semaine]={jours:getJoursDefaut(),matchDate:''};
  sems[semaine].jours[idx][champ]=val;
  setSemaines(sems);
  // Refresh la grille complète
  var tref=teamRef3();
  var grid=document.getElementById('planning-semaine');
  if(grid) grid.innerHTML=buildPlanningGrid(semaine,sems[semaine].jours,sems[semaine].matchDate||'',tref);
}

function getJoursDefaut(){
  return [
    {idx:0,nom:'Lundi',actif:true,type:'J-5',notes:''},
    {idx:1,nom:'Mardi',actif:false,type:'repos',notes:''},
    {idx:2,nom:'Mercredi',actif:true,type:'J-4',notes:''},
    {idx:3,nom:'Jeudi',actif:true,type:'J-3',notes:''},
    {idx:4,nom:'Vendredi',actif:true,type:'J-2',notes:''},
    {idx:5,nom:'Samedi',actif:true,type:'MATCH',notes:''},
    {idx:6,nom:'Dimanche',actif:false,type:'repos',notes:''}
  ];
}

function sauvegarderSemaine(semaine){
  var sems=getSemaines();
  if(!sems[semaine]) sems[semaine]={jours:getJoursDefaut(),matchDate:''};
  // Récupérer la date match
  var md=document.getElementById('plan-match-date');
  if(md) sems[semaine].matchDate=md.value;
  setSemaines(sems);
  notif('✓ Semaine du '+fd(semaine)+' sauvegardée');
}

function reinitSemaine(semaine){
  if(!confirm('Réinitialiser cette semaine ?')) return;
  var sems=getSemaines();
  sems[semaine]={jours:getJoursDefaut(),matchDate:''};
  setSemaines(sems);
  rPlanning();
  notif('Semaine réinitialisée','warn');
}

  var win=window.open('','_blank');

  html+='<style>body{font-family:Arial,sans-serif;padding:20px;color:#111}h1{font-size:20px;margin-bottom:4px}h2{font-size:13px;font-weight:400;color:#666;margin-bottom:20px}.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}.jour{border:1px solid #ddd;border-radius:6px;padding:10px;text-align:center}.jour-nom{font-weight:700;font-size:14px;margin-bottom:2px}.jour-date{font-size:11px;color:#999;margin-bottom:8px}.jour-type{font-weight:700;font-size:13px;margin-bottom:4px}.jour-desc{font-size:10px;color:#666;margin-bottom:6px}.jour-metrics{font-size:11px;margin-bottom:4px}.jour-notes{font-size:10px;color:#555;font-style:italic;border-top:1px solid #eee;padding-top:6px;margin-top:6px}.match{background:#fff0f0}.repos{opacity:.5}@media print{button{display:none}}</style>';
  html+='</head><body>';
  html+='<h1>📅 Planning semaine — USM Sapiac</h1>';
  html+='<h2>Semaine du '+fd(semaine)+' · S'+getSA()+'</h2>';
  html+='<div class="grid">';
  semData.jours.forEach(function(j,idx){
    var dateJ=new Date(lundi);dateJ.setDate(lundi.getDate()+idx);
    var dateStr=dateJ.toISOString().slice(0,10);
    var t=j.type||'repos';
    var pct=typePct[t]||0;
    var cD15=tref?Math.round(tref.d15*pct):0;
    var cD18=tref?Math.round(tref.d18*pct):0;
    var cD21=tref?Math.round(tref.d21*pct):0;
    html+='<div class="jour '+(t==='MATCH'?'match':'')+(t==='repos'?'repos':'')+'">';
    html+='<div class="jour-nom">'+j.nom+'</div>';
    html+='<div class="jour-date">'+dateStr.slice(8,10)+'/'+dateStr.slice(5,7)+'</div>';
    html+='<div class="jour-type">'+t+'</div>';
    html+='<div class="jour-desc">'+(typeDesc[t]||'')+'</div>';
    if(t!=='repos'&&tref){
      html+='<div class="jour-metrics">D&gt;15: <b>'+cD15+'m</b><br>D&gt;18: <b>'+cD18+'m</b><br>D&gt;21: <b>'+cD21+'m</b></div>';
    }
    if(j.notes) html+='<div class="jour-notes">'+j.notes+'</div>';
    html+='</div>';
  });
  html+='</div>';
  html+='<br><button onclick="window.print()">🖨 Imprimer</button>';
  html+='</body></html>';
  win.document.write(html);win.document.close();
}

// ════ RATIO PREDICTIF ════
function ratioLabel(r){
  r=parseFloat(r);
  if(r<=1.4) return 'SEMAINE LÉGÈRE';
  if(r<=1.7) return 'CHARGE MODÉRÉE';
  if(r<=2.0) return 'CHARGE NORMALE';
  if(r<=2.3) return 'CHARGE ÉLEVÉE';
  return 'CHARGE MAX';
}
function ratioColor(r){
  r=parseFloat(r);
  if(r<=1.4) return 'var(--green)';
  if(r<=1.7) return 'var(--blue)';
  if(r<=2.0) return 'var(--gold)';
  if(r<=2.3) return 'var(--orange)';
  return 'var(--red)';
}
function updateRatio(val){
  val=parseFloat(val);
  DB.set('plan_ratio',val);
  var rv=document.getElementById('ratio-val');
  var rl=document.getElementById('ratio-label');
  var rt=document.getElementById('ratio-table');
  if(rv){rv.textContent=val+'×';rv.style.color=ratioColor(val);}
  if(rl) rl.textContent=ratioLabel(val);
  if(rt) rt.innerHTML=buildRatioTable(val);
  // Mettre à jour aussi la grille planning
  var semaine=DB.get('plan_sem');
  var sems=getSemaines();
  var semData=sems[semaine]||{jours:getJoursDefaut(),matchDate:''};
  var grid=document.getElementById('planning-semaine');
  if(grid) grid.innerHTML=buildPlanningGrid(semaine,semData.jours,semData.matchDate||'',teamRef3());
}
function buildRatioTable(ratio){
  ratio=parseFloat(ratio);
  var j=getJ(),g=getG();
  var rc=ratioColor(ratio);
  var h='<div style="overflow-x:auto"><table class="tbl"><thead><tr>';
  h+='<th>Joueur</th><th>Groupe</th>';
  h+='<th style="color:var(--t3)">Réf D&gt;15</th><th style="color:var(--t3)">Réf D&gt;18</th><th style="color:var(--t3)">Réf D&gt;21</th>';
  h+='<th style="color:var(--blue)">▶ Cible D&gt;15</th><th style="color:var(--purple)">▶ Cible D&gt;18</th><th style="color:var(--orange)">▶ Cible D&gt;21</th>';
  h+='<th>Total cible</th></tr></thead><tbody>';
  var ordre=['BACKS','BIG 5','RUNNERS'];
  var joueurs=j.map(function(p){
    var mrows=matchesJ(p.init).filter(function(r){return r.dt>200;});
    var gr=g.find(function(x){return x.nom===p.groupe;});
    if(!mrows.length) return null;
    var rD15=Math.round(mrows.reduce(function(s,r){return s+r.d15;},0)/mrows.length);
    var rD18=Math.round(mrows.reduce(function(s,r){return s+r.d18;},0)/mrows.length);
    var rD21=Math.round(mrows.reduce(function(s,r){return s+r.d21;},0)/mrows.length);
    return{p:p,gr:gr,rD15:rD15,rD18:rD18,rD21:rD21,
      cD15:Math.round(rD15*ratio),cD18:Math.round(rD18*ratio),cD21:Math.round(rD21*ratio)};
  }).filter(Boolean).sort(function(a,b){
    return (ordre.indexOf(a.p.groupe)-ordre.indexOf(b.p.groupe))||a.p.nom.localeCompare(b.p.nom);
  });
  var grpCourant='';
  joueurs.forEach(function(x){
    if(x.p.groupe!==grpCourant){
      grpCourant=x.p.groupe;
      var gc2=x.gr?x.gr.color:'var(--t2)';
      h+='<tr style="background:'+gc2+'18"><td colspan="9" style="font-family:\'Barlow Condensed\',sans-serif;font-size:13px;font-weight:700;color:'+gc2+';padding:.5rem .75rem">'+grpCourant+'</td></tr>';
    }
    var gc3=x.gr?x.gr.color:'var(--t2)';
    h+='<tr>';
    h+='<td><div style="display:flex;align-items:center;gap:8px;cursor:pointer" onclick="openDetail(\''+x.p.init+'\')">';
    h+='<div class="av" style="width:26px;height:26px;background:'+gc3+'33;color:'+gc3+';font-size:10px">'+x.p.init+'</div>';
    h+='<span style="font-size:12px;font-weight:500">'+x.p.nom+'</span></div></td>';
    h+='<td><span class="badge" style="background:'+gc3+'22;color:'+gc3+';border:.5px solid '+gc3+'44">'+x.p.groupe+'</span></td>';
    h+='<td style="font-family:\'DM Mono\',monospace;font-size:11px;color:var(--t3)">'+x.rD15+'m</td>';
    h+='<td style="font-family:\'DM Mono\',monospace;font-size:11px;color:var(--t3)">'+x.rD18+'m</td>';
    h+='<td style="font-family:\'DM Mono\',monospace;font-size:11px;color:var(--t3)">'+x.rD21+'m</td>';
    h+='<td><div style="font-family:\'Barlow Condensed\',sans-serif;font-size:16px;font-weight:700;color:var(--blue)">'+x.cD15+'m</div></td>';
    h+='<td><div style="font-family:\'Barlow Condensed\',sans-serif;font-size:16px;font-weight:700;color:var(--purple)">'+x.cD18+'m</div></td>';
    h+='<td><div style="font-family:\'Barlow Condensed\',sans-serif;font-size:16px;font-weight:700;color:var(--orange)">'+x.cD21+'m</div></td>';
    h+='<td><div style="font-family:\'Barlow Condensed\',sans-serif;font-size:18px;font-weight:700;color:'+rc+'">'+(x.cD15+x.cD18+x.cD21)+'m</div></td>';
    h+='</tr>';
  });
  if(joueurs.length){
    var mD15=Math.round(joueurs.reduce(function(s,x){return s+x.cD15;},0)/joueurs.length);
    var mD18=Math.round(joueurs.reduce(function(s,x){return s+x.cD18;},0)/joueurs.length);
    var mD21=Math.round(joueurs.reduce(function(s,x){return s+x.cD21;},0)/joueurs.length);
    h+='<tr style="background:var(--bg2)">';
    h+='<td colspan="5" style="font-family:\'DM Mono\',monospace;font-size:10px;color:var(--gold);font-weight:600">MOY ÉQUIPE</td>';
    h+='<td style="font-family:\'Barlow Condensed\',sans-serif;font-size:14px;font-weight:700;color:var(--blue)">'+mD15+'m</td>';
    h+='<td style="font-family:\'Barlow Condensed\',sans-serif;font-size:14px;font-weight:700;color:var(--purple)">'+mD18+'m</td>';
    h+='<td style="font-family:\'Barlow Condensed\',sans-serif;font-size:14px;font-weight:700;color:var(--orange)">'+mD21+'m</td>';
    h+='<td style="font-family:\'Barlow Condensed\',sans-serif;font-size:14px;font-weight:700;color:'+rc+'">'+(mD15+mD18+mD21)+'m</td>';
    h+='</tr>';
  }
  h+='</tbody></table></div>';
  return h;
}
function rParams(){rSaisons();rPostes();rGroupesSel();rJTbl();document.getElementById('param-saison-label').textContent=getSA();}

function addSaison(){
  var nom=document.getElementById('inp-snom').value.trim();
  var deb=document.getElementById('inp-sdeb').value;
  var fin=document.getElementById('inp-sfin').value;
  if(!nom) return notif('Entre un nom','warn');
  if(!deb||!fin) return notif('Entre les dates début et fin','warn');
  var s=getSaisons();
  if(s.find(function(x){return x.nom===nom;})) return notif('Saison déjà existante','warn');
  s.push({nom:nom,deb:deb,fin:fin});setSaisons(s);
  document.getElementById('inp-snom').value='';document.getElementById('inp-sdeb').value='';document.getElementById('inp-sfin').value='';
  rSaisons();notif('Saison '+nom+' créée');
}

function setActiveSaison(nom){
  setSA(nom);document.getElementById('sbadge').textContent='S '+nom;
  rSaisons();rJTbl();document.getElementById('param-saison-label').textContent=nom;
  notif('Saison active: '+nom);
}

function delSaison(nom){
  if(!confirm('Supprimer '+nom+' ?')) return;
  setSaisons(getSaisons().filter(function(x){return x.nom!==nom;}));rSaisons();notif('Supprimée','warn');
}

function rSaisons(){
  var s=getSaisons(),a=getSA();
  document.getElementById('list-saisons').innerHTML=s.map(function(x){
    var jl=getJ(x.nom).length;
    return '<div style="background:var(--bg2);border-radius:7px;margin-bottom:.375rem;border:.5px solid '+(x.nom===a?'rgba(240,192,64,.3)':'var(--b)')+'">'+
      '<div style="display:flex;align-items:center;gap:10px;padding:.625rem 1rem">'+
        '<div style="flex:1">'+
          '<div style="font-family:\'Barlow Condensed\',sans-serif;font-size:16px;font-weight:600;color:'+(x.nom===a?'var(--gold)':'var(--t2)')+'">'+x.nom+'</div>'+
          '<div style="font-size:9px;color:var(--t3);font-family:\'DM Mono\',monospace">'+(x.deb?fd(x.deb)+' → '+fd(x.fin):'')+' · '+jl+' joueurs</div>'+
        '</div>'+
        (x.nom===a?'<span class="badge" style="background:rgba(240,192,64,.15);color:var(--gold);border:.5px solid rgba(240,192,64,.3)">ACTIVE</span>':'<button class="btn bg" style="padding:4px 12px;font-size:10px" onclick="setActiveSaison(\''+x.nom+'\')">Activer</button>')+
        '<button class="btn bb" style="padding:4px 10px;font-size:10px" onclick="toggleEditSaison(\''+x.nom+'\')">✏️</button>'+
        '<button class="btn br" style="padding:4px 10px;font-size:10px" onclick="delSaison(\''+x.nom+'\')">✕</button>'+
      '</div>'+
      '<div id="edit-saison-'+x.nom.replace('/','_')+'" style="display:none;padding:.75rem 1rem;border-top:.5px solid var(--b);background:var(--bg3);border-radius:0 0 7px 7px">'+
        '<div style="display:flex;gap:.75rem;align-items:flex-end;flex-wrap:wrap">'+
          '<div><label class="lbl">Date début</label><input class="inp" id="deb-'+x.nom.replace('/','_')+'" type="date" value="'+(x.deb||'')+'" style="width:160px"/></div>'+
          '<div><label class="lbl">Date fin</label><input class="inp" id="fin-'+x.nom.replace('/','_')+'" type="date" value="'+(x.fin||'')+'" style="width:160px"/></div>'+
          '<button class="btn bgr" onclick="saveDatesSaison(\''+x.nom+'\')">✓ Enregistrer</button>'+
          '<button class="btn" style="background:var(--bg2);color:var(--t2);border:.5px solid var(--b2)" onclick="toggleEditSaison(\''+x.nom+'\')">Annuler</button>'+
        '</div>'+
      '</div>'+
    '</div>';
  }).join('');
}

function toggleEditSaison(nom){
  var id='edit-saison-'+nom.replace('/','_');
  var el=document.getElementById(id);
  if(el) el.style.display=el.style.display==='none'?'block':'none';
}

function saveDatesSaison(nom){
  var id=nom.replace('/','_');
  var deb=document.getElementById('deb-'+id).value;
  var fin=document.getElementById('fin-'+id).value;
  if(!deb||!fin) return notif('Entre les deux dates','warn');
  var s=getSaisons();
  var i=s.findIndex(function(x){return x.nom===nom;});
  if(i<0) return;
  s[i].deb=deb;s[i].fin=fin;
  setSaisons(s);rSaisons();
  notif('✓ Dates de '+nom+' mises à jour');
}

function rPostes(){
  ['inp-jposte','mo-poste'].forEach(function(id){var s=document.getElementById(id);if(s)s.innerHTML=POSTES_DEF.map(function(x){return '<option value="'+x+'">'+x+'</option>';}).join('');});
}
function rGroupesSel(){
  var g=getG();
  ['inp-jgroupe','mo-groupe'].forEach(function(id){var s=document.getElementById(id);if(s)s.innerHTML='<option value="">— Sans groupe —</option>'+g.map(function(x){return '<option value="'+x.nom+'">'+x.nom+'</option>';}).join('');});
}
function addJoueur(){
  var nom=document.getElementById('inp-jnom').value.trim();
  var init=document.getElementById('inp-jinit').value.trim();
  if(!nom) return notif('Entre le nom','warn');
  var j=getJ();if(j.find(function(x){return x.nom===nom;})) return notif('Déjà dans cette saison','warn');
  j.push({id:Date.now(),nom:nom,init:init||ini(nom),poste:document.getElementById('inp-jposte').value,groupe:document.getElementById('inp-jgroupe').value,ddn:document.getElementById('inp-jddn').value,actif:true});
  setJ(j);rJTbl();document.getElementById('inp-jnom').value='';document.getElementById('inp-jinit').value='';
  notif('✓ '+nom+' ajouté à S'+getSA());
}
function delJoueur(id){
  if(!confirm('Retirer de la saison '+getSA()+' ?')) return;
  setJ(getJ().filter(function(j){return j.id!==id;}));rJTbl();notif('Retiré','warn');
}
function rJTbl(){
  var j=getJ(),g=getG();
  document.getElementById('nb-j').textContent='('+j.length+')';
  if(!j.length){document.getElementById('tb-j').innerHTML='<tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--t3);font-size:11px">Aucun joueur pour cette saison</td></tr>';return;}
  document.getElementById('tb-j').innerHTML=j.map(function(p){
    var gr=g.find(function(x){return x.nom===p.groupe;});
    var age=p.ddn?Math.floor((Date.now()-new Date(p.ddn))/(365.25*24*3600*1000)):'—';
    return '<tr><td><div class="av" style="width:28px;height:28px;background:'+(gr?gr.color+'22':'var(--bg3)')+';color:'+(gr?gr.color:'var(--t2)')+';font-size:10px">'+(p.init||ini(p.nom))+'</div></td>'+
      '<td style="font-weight:500">'+p.nom+'</td>'+
      '<td><span class="badge" style="background:var(--bg3);color:var(--t2);border:.5px solid var(--b2)">'+(p.poste||'—')+'</span></td>'+
      '<td>'+(gr?'<span class="badge" style="background:'+gr.color+'22;color:'+gr.color+';border:.5px solid '+gr.color+'44">'+p.groupe+'</span>':'-')+'</td>'+
      '<td style="font-family:\'DM Mono\',monospace;font-size:12px">'+age+'</td>'+
      '<td style="display:flex;gap:.375rem"><button class="btn bb" style="padding:3px 10px;font-size:10px" onclick="oEdit('+p.id+')">✏️</button><button class="btn br" style="padding:3px 9px;font-size:10px" onclick="delJoueur('+p.id+')">✕</button></td></tr>';
  }).join('');
}
function oEdit(id){
  var p=getJ().find(function(x){return x.id===id;});if(!p)return;
  var gr=getG().find(function(x){return x.nom===p.groupe;});
  document.getElementById('mo-id').value=id;document.getElementById('mo-nom').value=p.nom;
  document.getElementById('mo-init').value=p.init||'';document.getElementById('mo-ddn').value=p.ddn||'';
  rPostes();rGroupesSel();
  document.getElementById('mo-poste').value=p.poste||'';document.getElementById('mo-groupe').value=p.groupe||'';
  var av=document.getElementById('mo-av');av.textContent=p.init||ini(p.nom);
  av.style.background=gr?gr.color+'33':'var(--bg3)';av.style.color=gr?gr.color:'var(--t2)';
  av.style.border='2px solid '+(gr?gr.color+'55':'var(--b2)');
  document.getElementById('mo-edit').style.display='flex';
}
function saveJoueur(){
  var id=parseInt(document.getElementById('mo-id').value);
  var nom=document.getElementById('mo-nom').value.trim();
  if(!nom) return notif('Nom requis','warn');
  var j=getJ();var i=j.findIndex(function(x){return x.id===id;});if(i<0)return;
  j[i]=Object.assign({},j[i],{nom:nom,init:document.getElementById('mo-init').value.trim()||ini(nom),poste:document.getElementById('mo-poste').value,groupe:document.getElementById('mo-groupe').value,ddn:document.getElementById('mo-ddn').value});
  setJ(j);cmo('mo-edit');rJTbl();
  if(document.getElementById('pg-joueurs').classList.contains('on')) rJoueurs();
  notif('✓ '+nom+' mis à jour');
}
